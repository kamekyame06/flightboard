<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国内線 時刻表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#080f1c;--panel:#0d1826;--card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.09);--accent:#00d4ff;--green:#00e87a;
  --orange:#ff6b35;--gold:#f5c842;--text:#dff0ff;--muted:#5580a0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* ─── LAYOUT ─── */
.wrapper{display:grid;grid-template-columns:380px 1fr;grid-template-rows:auto 1fr;height:100vh;overflow:hidden;}
@media(max-width:800px){.wrapper{grid-template-columns:1fr;grid-template-rows:auto auto 1fr;height:auto;overflow:auto;}}

/* ─── LEFT PANEL ─── */
.left-panel{
  grid-row:1/3;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
@media(max-width:800px){.left-panel{grid-row:auto;max-height:45vh;}}

.panel-header{
  padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(180deg,rgba(0,80,140,0.15) 0%,transparent 100%);
}
.brand{display:flex;align-items:center;gap:10px;}
.plane-anim{font-size:22px;animation:fly 3s ease-in-out infinite;}
@keyframes fly{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-4px) rotate(3deg);}}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.3);}
.brand p{font-size:9px;color:var(--muted);letter-spacing:2px;}
.live-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
#liveTime{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--green);letter-spacing:1px;}
.demo-tag{margin-left:auto;font-size:9px;color:var(--gold);background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.2);border-radius:8px;padding:2px 7px;}

/* ─── API KEY PANEL ─── */
.apikey-bar{
  padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(0,0,0,0.2);
}
.apikey-row{display:flex;gap:6px;align-items:center;}
.apikey-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.apikey-input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:11px;font-family:'Noto Sans JP',sans-serif;
  padding:5px 9px;outline:none;min-width:0;
}
.apikey-input:focus{border-color:var(--accent);}
.apikey-input::placeholder{color:var(--muted);font-size:10px;}
.apikey-save{
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);color:var(--accent);
  border-radius:7px;padding:5px 10px;font-size:10px;cursor:pointer;white-space:nowrap;
  font-family:'Noto Sans JP',sans-serif;transition:.2s;
}
.apikey-save:hover{background:rgba(0,212,255,.2);}
.apikey-status{
  font-size:9px;margin-top:5px;display:flex;align-items:center;gap:5px;
}
.apikey-status a{color:var(--accent);font-size:9px;}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.status-dot.demo{background:var(--gold);}
.status-dot.live{background:var(--green);}
.status-dot.err{background:var(--orange);}

/* data source badge on card */
.src-badge{
  position:absolute;bottom:6px;right:8px;
  font-size:8px;padding:1px 5px;border-radius:5px;font-weight:700;
}
.src-badge.live{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.src-badge.demo{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);}

/* ─── STEP INDICATOR ─── */
.step-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.step{display:flex;align-items:center;gap:5px;font-size:11px;}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid var(--border);color:var(--muted);transition:.2s;}
.step.active .step-num{border-color:var(--green);color:var(--green);background:rgba(0,232,122,.1);}
.step.done .step-num{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1);}
.step-label{color:var(--muted);transition:.2s;font-size:11px;}
.step.active .step-label,.step.done .step-label{color:var(--text);}
.step-sep{color:var(--border);}
.sel-chip{display:inline-flex;align-items:center;gap:3px;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;}
.sel-chip.dep{background:rgba(0,232,122,.12);border:1px solid rgba(0,232,122,.3);color:var(--green);}
.sel-chip.arr{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);color:var(--orange);}

/* ─── ROUTE DISPLAY ─── */
.route-display{
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  min-height:64px;display:flex;align-items:center;
}
.route-empty{font-size:12px;color:var(--muted);text-align:center;width:100%;}
.route-inner{display:flex;align-items:center;gap:10px;width:100%;}
.route-ap{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.route-ap.dep{color:var(--green);}
.route-ap.arr{color:var(--orange);}
.route-ap-name{font-size:10px;color:var(--muted);margin-top:1px;}
.route-mid{flex:1;text-align:center;}
.route-line-svg{width:100%;height:24px;}
.route-dur{font-size:10px;color:var(--muted);}

/* ─── DATE + SEARCH ─── */
.date-search{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:flex-end;}
.date-search .field{flex:1;}
.date-search label{display:block;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.date-search input[type=date]{
  width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;
  padding:7px 10px;outline:none;cursor:pointer;
  color-scheme: dark;
}
.date-search input:focus{border-color:var(--accent);}
.search-btn{
  background:linear-gradient(135deg,#00d4ff,#0083c0);border:none;color:#fff;
  border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 15px rgba(0,212,255,.25);transition:all .2s;
  letter-spacing:.5px;
}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 5px 22px rgba(0,212,255,.4);}
.search-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.reset-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif;}
.reset-btn:hover{border-color:rgba(255,100,100,.4);color:#ff8888;}

/* ─── RESULTS PANE (inside left) ─── */
.results-pane{flex:1;overflow-y:auto;padding:10px 12px;}
.results-pane::-webkit-scrollbar{width:4px;}
.results-pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.date-nav{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:3px;}
.date-nav::-webkit-scrollbar{height:3px;}
.date-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.date-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:16px;padding:4px 11px;font-size:10px;cursor:pointer;transition:.2s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.date-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07);}
.date-chip:hover:not(.active){color:var(--text);border-color:rgba(255,255,255,.15);}

.filter-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.filter-chip{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:14px;padding:3px 10px;font-size:10px;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif;}
.filter-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.07);}

.results-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.results-title{font-size:11px;color:var(--muted);}
.results-title strong{color:var(--text);font-size:12px;}
.sort-sel{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;outline:none;font-family:'Noto Sans JP',sans-serif;}
.sort-sel option{background:#0d2248;}

.loading{text-align:center;padding:28px;display:none;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.no-results{display:none;text-align:center;padding:24px;color:var(--muted);font-size:12px;}

/* ─── FLIGHT CARD ─── */
.flight-card{
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:11px 13px;display:grid;grid-template-columns:64px 1fr auto;
  gap:10px;align-items:center;cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;animation:fadeUp .25s ease both;
  margin-bottom:7px;
}
.flight-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--accent);opacity:0;transition:.2s;}
.flight-card:hover{border-color:rgba(0,212,255,.3);transform:translateX(2px);}
.flight-card:hover::before{opacity:1;}
.flight-card.cheapest::after{content:'最安';position:absolute;top:7px;right:8px;background:var(--gold);color:#1a1000;font-size:8px;font-weight:700;padding:1px 5px;border-radius:6px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

.al-col{text-align:center;}
.al-logo{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin:0 auto 2px;letter-spacing:.3px;}
.al-name{font-size:7px;color:var(--muted);}
.al-fnum{font-size:8px;color:var(--muted);}

.time-col{display:flex;align-items:center;gap:6px;}
.t-block{text-align:center;}
.t-time{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#fff;letter-spacing:.5px;}
.t-code{font-size:8px;color:var(--muted);letter-spacing:.5px;}
.t-route{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px;}
.t-dur{font-size:9px;color:var(--muted);}
.t-line{width:100%;display:flex;align-items:center;gap:2px;}
.t-bar{flex:1;height:1px;background:linear-gradient(90deg,var(--border),rgba(0,212,255,.35),var(--border));}
.t-plane{font-size:10px;color:var(--accent);}

.pr-col{text-align:right;min-width:80px;}
.pr-lbl{font-size:8px;color:var(--muted);margin-bottom:2px;}
.pr-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1;}
.pr-unit{font-size:8px;color:var(--muted);}
.avail{font-size:9px;margin-top:2px;}
.avail.ok{color:var(--green);}
.avail.few{color:var(--orange);}
.avail.none{color:#444;}

/* ─── MAP ─── */
.map-header{
  padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.2);
}
.map-header-text{font-size:11px;color:var(--muted);}
.map-header-text span{color:var(--text);}

#map{
  grid-column:2;grid-row:1/3;width:100%;height:100%;
  background:#060f1c;
}
@media(max-width:800px){#map{grid-column:1;grid-row:auto;height:55vw;min-height:280px;}}

/* Leaflet dark override */
.leaflet-tile{filter:brightness(0.65) saturate(0.5) hue-rotate(180deg);}
.leaflet-container{background:#060f1c !important;}

/* Airport marker */
.ap-marker{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;letter-spacing:.3px;
  border:2px solid rgba(0,212,255,0.4);
  background:rgba(0,30,60,0.85);
  color:rgba(0,212,255,0.9);
  cursor:pointer;transition:all .2s;
  backdrop-filter:blur(4px);
  white-space:nowrap;
  box-shadow:0 0 8px rgba(0,212,255,0.2);
}
.ap-marker:hover{border-color:var(--accent);color:#fff;box-shadow:0 0 14px rgba(0,212,255,0.6);transform:scale(1.1);}
.ap-marker.dep{border-color:var(--green);color:var(--green);background:rgba(0,40,20,0.9);box-shadow:0 0 12px rgba(0,232,122,0.5);}
.ap-marker.arr{border-color:var(--orange);color:var(--orange);background:rgba(40,15,0,0.9);box-shadow:0 0 12px rgba(255,107,53,0.5);}

.leaflet-popup-content-wrapper{background:rgba(8,20,40,0.95);border:1px solid var(--border);color:var(--text);border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.5);}
.leaflet-popup-tip{background:rgba(8,20,40,0.95);}
.leaflet-popup-content{margin:8px 12px;font-family:'Noto Sans JP',sans-serif;font-size:12px;}
.ap-popup-code{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;}
.ap-popup-name{font-size:11px;color:var(--muted);}
.ap-popup-note{font-size:10px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div class="wrapper">

<!-- ─── LEFT PANEL ─── -->
<div class="left-panel">

  <!-- Brand -->
  <div class="panel-header">
    <div class="brand">
      <div class="plane-anim">✈</div>
      <div>
        <h1>FLIGHT BOARD</h1>
        <p>国内線 時刻表</p>
      </div>
    </div>
    <div class="live-row">
      <div class="live-dot"></div>
      <span id="liveTime">--:--:--</span>
      <span class="demo-tag" id="demo-tag-header">⚠ デモデータ</span>
    </div>
  </div>

  <!-- API Key Bar -->
  <div class="apikey-bar">
    <div class="apikey-row">
      <span class="apikey-label">APIキー</span>
      <input class="apikey-input" id="apikeyInput" type="text" placeholder="AirLabs APIキーを入力（無料登録→airlabs.co）" spellcheck="false"/>
      <button class="apikey-save" onclick="saveApiKey()">保存</button>
    </div>
    <div class="apikey-status" id="apikeyStatus">
      <div class="status-dot demo"></div>
      <span id="apikeyStatusText">デモデータ使用中 ·&nbsp;</span>
      <a href="https://airlabs.co/signup" target="_blank">無料APIキーを取得 →</a>
    </div>
  </div>

  <!-- Step bar -->
  <div class="step-bar" id="stepBar">
    <div class="step active" id="s1"><div class="step-num">1</div><div class="step-label" id="sl1">出発空港を選択</div></div>
    <div class="step-sep">›</div>
    <div class="step" id="s2"><div class="step-num">2</div><div class="step-label" id="sl2">到着空港を選択</div></div>
    <div class="step-sep">›</div>
    <div class="step" id="s3"><div class="step-num">3</div><div class="step-label">検索</div></div>
  </div>

  <!-- Route display -->
  <div class="route-display">
    <div id="routeDisplay" style="width:100%">
      <div class="route-empty">地図の空港マーカーをクリック</div>
    </div>
  </div>

  <!-- Date + Search -->
  <div class="date-search">
    <div class="field">
      <label>出発日</label>
      <input type="date" id="dateInput">
    </div>
    <button class="search-btn" id="searchBtn" disabled onclick="doSearch()">検索</button>
    <button class="reset-btn" onclick="resetSelection()">↺</button>
  </div>

  <!-- Results -->
  <div class="results-pane" id="resultsPane" style="display:none;">
    <div id="dateNav" class="date-nav"></div>
    <div id="filterBar" class="filter-bar"></div>
    <div class="loading" id="loading"><div class="spinner"></div><div style="font-size:11px;color:var(--muted)">検索中...</div></div>
    <div class="results-hdr" id="resultsHdr" style="display:none;">
      <div class="results-title" id="resultsTitle"></div>
      <select class="sort-sel" onchange="sortFlights(this.value)">
        <option value="dep">出発順</option>
        <option value="price">料金順</option>
        <option value="dur">所要時間順</option>
      </select>
    </div>
    <div id="flightsList"></div>
    <div class="no-results" id="noResults">この区間の就航便は見つかりませんでした</div>
  </div>

</div><!-- left-panel -->

<!-- ─── MAP ─── -->
<div id="map"></div>

</div><!-- wrapper -->

<script>
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════

  NRT:{name:'成田',full:'東京(成田)',lat:35.764,lng:140.386,region:'関東',rank:4},
  IBR:{name:'茨城',full:'茨城',lat:36.181,lng:140.415,region:'関東',rank:1},

// ══════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════
function seededRng(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967296; };
}
function hashStr(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(16777619, h) >>> 0; }
  return h;
}
function fmtTime(m) { return `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function fmtDur(m) { return `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}m`; }
function haversine(a, b) {
  const R=6371, toR=d=>d*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const x=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

// ══════════════════════════════════════════════
//  FLIGHT GENERATION
// ══════════════════════════════════════════════
function generateFlights(from, to, date) {
  if (from === to || !hasRoute(from, to)) return [];

  const rng = seededRng(hashStr(from + to + date));
  const ri  = () => rng();          // 0-1
  const rn  = n  => Math.floor(rng() * n);

  // Distance-based duration
  const dist = haversine(AIRPORTS[from], AIRPORTS[to]);
  const baseDur = Math.round(30 + dist * 0.48);

  // Rank-based airline/count selection
  const rankA = AIRPORTS[from].rank, rankB = AIRPORTS[to].rank;
  const routeRank = Math.min(rankA, rankB) + Math.max(rankA, rankB);
  const count = routeRank >= 8 ? 10 + rn(6) : routeRank >= 5 ? 5 + rn(4) : 2 + rn(3);

  // Airline pool based on route
  let pool;
  const rk = [from,to].sort().join('-');
  if (['HND-CTS','HND-FUK','HND-OKA','HND-ITM','ITM-FUK','NRT-FUK'].includes(rk)) pool = AIRLINES.slice(0,8);
  else if (routeRank >= 6) pool = AIRLINES.slice(0,5);
  else pool = AIRLINES.slice(0,3);

  // Price based on distance
  const basePrice = Math.round((5000 + dist * 28) / 500) * 500;

  // Time slots (minutes from midnight)
  const allSlots = [545,605,635,700,730,800,830,855,920,950,1015,1050,1120,1200,1240,1310,1350,1430,1500,1540,1620,1700,1730,1800,1840,1915,1950,2030];
  const used = new Set();
  const times = [];
  for (let i = 0; i < count && times.length < count; i++) {
    let t, tries = 0;
    do { t = allSlots[rn(allSlots.length)]; tries++; } while (used.has(t) && tries < 40);
    used.add(t); times.push(t);
  }
  times.sort((a,b)=>a-b);

  return times.map((dep, i) => {
    const airline = pool[Math.floor(ri() * pool.length)];
    const dur = baseDur + Math.round((ri()-0.5)*14);
    const arr = dep + dur;
    const pv  = 0.55 + ri()*0.7;
    const price = Math.round(basePrice * pv / 500) * 500;
    const fnum = airline.code[0] + (100 + rn(800));
    return { dep, arr, airline, fnum, dur, price, idx: i };
  });
}

function getSeat(f) {
  const tb = Math.floor(Date.now() / 30000);
  let s = hashStr(f.fnum + tb);
  s = ((s * 1103515245) + 12345) & 0x7fffffff;
  const v = s % 100;
  if (v < 55) return { text:'余裕あり', cls:'ok', ic:'○' };
  if (v < 80) return { text:'残りわずか', cls:'few', ic:'△' };
  return { text:'満席', cls:'none', ic:'✕' };
}

// Create markers
Object.entries(AIRPORTS).forEach(([code, ap]) => {

});

function onAirportClick(code) {
  if (!selectedDep) {
    selectedDep = code;
    markers[code]._el.classList.add('dep');
    updateStep(); updateRouteDisplay();
  } else if (!selectedArr && code !== selectedDep) {
    // ルートチェック: APIキーがある場合はスキップ（APIが判断）
    if (!currentApiKey && !hasRoute(selectedDep, code)) {
      const el = markers[code]._el;
      el.style.borderColor = '#f00'; el.style.color='#f00';
      setTimeout(()=>{ el.style.borderColor=''; el.style.color=''; }, 600);
      showToast(`${selectedDep}〜${code} の就航路線はありません（デモデータ）`);
      return;
    }
    selectedArr = code;
    markers[code]._el.classList.add('arr');
    drawRoute(); updateStep(); updateRouteDisplay();
    document.getElementById('searchBtn').disabled = false;
  } else if (code === selectedDep) {
    resetSelection();
  } else {
    if (!currentApiKey && !hasRoute(selectedDep, code)) {
      showToast(`${selectedDep}〜${code} の就航路線はありません（デモデータ）`);
      return;
    }
    markers[selectedArr]._el.classList.remove('arr');
    selectedArr = code;
    markers[code]._el.classList.add('arr');
    drawRoute(); updateStep(); updateRouteDisplay();
    document.getElementById('searchBtn').disabled = false;
  }
}

function drawRoute() {
  if (routePolyline) map.removeLayer(routePolyline);
  if (!selectedDep || !selectedArr) return;
  const a = AIRPORTS[selectedDep], b = AIRPORTS[selectedArr];
  // Arc path
  const pts = [];
  for (let t=0; t<=1; t+=0.05) {
    const lat = a.lat + (b.lat-a.lat)*t;
    const lng = a.lng + (b.lng-a.lng)*t;
    const arc = Math.sin(t*Math.PI)*1.5;
    pts.push([lat + arc*0.3, lng]);
  }
  routePolyline = L.polyline(pts, {
    color:'#00d4ff', weight:1.5, opacity:0.6,
    dashArray:'6 5'
  }).addTo(map);
  map.fitBounds([[a.lat,a.lng],[b.lat,b.lng]], {padding:[50,50]});
}

function resetSelection() {
  if (selectedDep) markers[selectedDep]._el.classList.remove('dep');
  if (selectedArr) markers[selectedArr]._el.classList.remove('arr');
  selectedDep = null; selectedArr = null;
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline=null; }
  document.getElementById('searchBtn').disabled = true;
  updateStep(); updateRouteDisplay();
  document.getElementById('resultsPane').style.display='none';
}

    s1.className='step active'; s2.className='step'; s3.className='step';
    l1.innerHTML='出発空港を選択'; l2.textContent='到着空港を選択';
  } else if (!selectedArr) {
    s1.className='step done'; l1.innerHTML=`<span class="sel-chip dep">✈${selectedDep}</span>`;
    s2.className='step active'; s3.className='step'; l2.textContent='到着空港を選択';
  } else {
    s1.className='step done'; l1.innerHTML=`<span class="sel-chip dep">✈${selectedDep}</span>`;
    s2.className='step done'; l2.innerHTML=`<span class="sel-chip arr">→${selectedArr}</span>`;
    s3.className='step active';
  }
}

function updateRouteDisplay() {
  const el = document.getElementById('routeDisplay');
  if (!selectedDep) { el.innerHTML='<div class="route-empty">地図の空港マーカーをクリック</div>'; return; }
  const a = AIRPORTS[selectedDep];
  if (!selectedArr) {
    el.innerHTML=`<div class="route-inner"><div><div class="route-ap dep">${selectedDep}</div><div class="route-ap-name">${a.full}</div></div><div class="route-mid" style="color:var(--muted);font-size:12px">→ 到着を選択</div></div>`;
    return;
  }
  const b = AIRPORTS[selectedArr];
  const dist = Math.round(haversine(a, b));
  el.innerHTML=`
    <div class="route-inner">
      <div><div class="route-ap dep">${selectedDep}</div><div class="route-ap-name">${a.full}</div></div>
      <div class="route-mid">
        <div class="route-dur">約 ${Math.round(30+dist*0.48)}分 · ${dist}km</div>
        <svg class="route-line-svg" viewBox="0 0 80 20"><line x1="0" y1="10" x2="72" y2="10" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="4 3"/><text x="74" y="14" fill="var(--accent)" font-size="12">✈</text></svg>
      </div>
      <div><div class="route-ap arr">${selectedArr}</div><div class="route-ap-name">${b.full}</div></div>
    </div>`;
}

// Toast notification
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a0800;border:1px solid rgba(255,107,53,.4);color:#ff9966;padding:8px 18px;border-radius:20px;font-size:12px;z-index:9999;font-family:"Noto Sans JP",sans-serif;pointer-events:none;transition:opacity .3s;'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.style.opacity='0',2500);
}

// ══════════════════════════════════════════════
//  SEARCH & RENDER
// ══════════════════════════════════════════════
let curFlights=[], curFrom='', curTo='', curDate='', activeFilter='all';
let seatTimer=null;

function doSearch() {
  if (!selectedDep || !selectedArr) return;
  const date = document.getElementById('dateInput').value;
  if (!date) { alert('出発日を選択してください'); return; }
  runSearch(selectedDep, selectedArr, date);
}

function runSearch(from, to, date) {
  curFrom=from; curTo=to; curDate=date; activeFilter='all';
  const pane = document.getElementById('resultsPane');
  pane.style.display='block';
  document.getElementById('loading').style.display='block';
  document.getElementById('flightsList').innerHTML='';
  document.getElementById('resultsHdr').style.display='none';
  document.getElementById('noResults').style.display='none';
  pane.scrollTop=0;

  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    curFlights = generateFlights(from, to, date);
    renderDateNav(date, from, to);
    renderFilterBar();
    renderFlights(curFlights, from, to, date);
    startSeatRefresh();
  }, 450);
}

function renderDateNav(dateStr, from, to) {
  const nav=document.getElementById('dateNav'); nav.innerHTML='';
  const d=new Date(dateStr);
  const dw=['日','月','火','水','木','金','土'];
  for (let i=-2; i<=5; i++) {
    const nd=new Date(d); nd.setDate(nd.getDate()+i);
    const chip=document.createElement('div');
    chip.className='date-chip'+(i===0?' active':'');
    chip.textContent=`${nd.getMonth()+1}/${nd.getDate()}(${dw[nd.getDay()]})`;
    chip.onclick=()=>{
      document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      const ds=nd.toISOString().slice(0,10);
      curDate=ds; curFlights=generateFlights(from,to,ds);
      renderFlights(curFlights,from,to,ds);
    };
    nav.appendChild(chip);
  }
}

function renderFilterBar() {
  const bar=document.getElementById('filterBar'); bar.innerHTML='';
  [{k:'all',l:'すべて'},{k:'morning',l:'朝 〜09時'},{k:'midday',l:'昼 09-17時'},{k:'evening',l:'夜 17時〜'},{k:'cheap',l:'格安TOP5'}].forEach(f=>{
    const c=document.createElement('div');
    c.className='filter-chip'+(f.k===activeFilter?' active':'');
    c.textContent=f.l;
    c.onclick=()=>{ activeFilter=f.k; renderFilterBar(); applyFilter(); };
    bar.appendChild(c);
  });
}

function applyFilter() {
  let f=[...curFlights];
  if(activeFilter==='morning') f=f.filter(x=>x.dep<540);
  else if(activeFilter==='midday') f=f.filter(x=>x.dep>=540&&x.dep<1020);
  else if(activeFilter==='evening') f=f.filter(x=>x.dep>=1020);
  else if(activeFilter==='cheap') f=[...f].sort((a,b)=>a.price-b.price).slice(0,5);
  renderFlights(f,curFrom,curTo,curDate,true, dataSource==='live');
}

function sortFlights(by) {
  const s=[...curFlights];
  if(by==='price') s.sort((a,b)=>(a.price||0)-(b.price||0));
  else if(by==='dep')   s.sort((a,b)=>a.dep-b.dep);
  else if(by==='dur')   s.sort((a,b)=>a.dur-b.dur);
  renderFlights(s,curFrom,curTo,curDate,false, dataSource==='live');
}

function renderFlights(flights, from, to, date, isFiltered=false, isReal=false) {
  const list=document.getElementById('flightsList');
  const hdr=document.getElementById('resultsHdr');
  const noRes=document.getElementById('noResults');
  const d=new Date(date);
  const dw=['日','月','火','水','木','金','土'];
  hdr.style.display='flex';
  const srcLabel = isReal
    ? `<span style="color:var(--green);font-size:9px;font-weight:700">● LIVE</span>`
    : `<span style="color:var(--gold);font-size:9px">○ デモ</span>`;
  document.getElementById('resultsTitle').innerHTML=
    `<strong>${AIRPORTS[from].full} → ${AIRPORTS[to].full}</strong> ${srcLabel}<br>${d.getMonth()+1}/${d.getDate()}(${dw[d.getDay()]}) · ${flights.length}便`;
  list.innerHTML='';
  if (!flights.length) { noRes.style.display='block'; return; }
  noRes.style.display='none';
  const minP = isReal ? null : Math.min(...(curFlights.filter(f=>f.price)).map(f=>f.price));

  flights.forEach((f,i) => {
    const card=document.createElement('div');
    const isCheap = !isReal && minP && f.price===minP && !isFiltered;
    card.className='flight-card'+(isCheap?' cheapest':'');
    card.style.animationDelay=`${i*30}ms`;
    card.dataset.fnum=f.fnum;

    let statusHtml = '';
    if (isReal) {
      const st = f.status || 'scheduled';
      if (st === 'en-route') statusHtml = `<span style="color:var(--green);font-size:9px">✈ 飛行中</span>`;
      else if (st === 'landed') statusHtml = `<span style="color:var(--muted);font-size:9px">到着済</span>`;
      else if (st === 'cancelled') statusHtml = `<span style="color:#f55;font-size:9px">欠航</span>`;
      else if (st === 'delayed' || f.delayed > 0) statusHtml = `<span style="color:var(--orange);font-size:9px">遅延 +${f.delayed}分</span>`;
      // scheduled は何も表示しない
    } else {
      const seat = getSeat(f);
      statusHtml = `<span class="avail ${seat.cls}">${seat.ic} ${seat.text}</span>`;
    }

    const gateHtml = (isReal && f.gate) ? `<div style="font-size:8px;color:var(--muted)">ゲート ${f.gate}</div>` : '';
    const priceHtml = isReal
      ? ``
      : `<div class="pr-lbl">片道最安</div><div class="pr-num">¥${f.price.toLocaleString()}</div><div class="pr-unit">税込</div>`;

    card.innerHTML=`
      <div class="al-col">
        <div class="al-logo" style="background:${f.airline.bg};color:${f.airline.color};border:1px solid ${f.airline.color}44">${f.airline.short}</div>
        <div class="al-name">${f.airline.name}</div>
        <div class="al-fnum">${f.fnum}</div>
      </div>
      <div class="time-col">
        <div class="t-block"><div class="t-time">${fmtTime(f.dep)}</div><div class="t-code">${from}</div>${gateHtml}</div>
        <div class="t-route">
          <div class="t-dur">${fmtDur(f.dur)}</div>
          <div class="t-line"><div class="t-bar"></div><div class="t-plane">✈</div><div class="t-bar"></div></div>
          <div style="font-size:8px;color:rgba(0,212,255,0.45)">直行</div>
        </div>
        <div class="t-block"><div class="t-time">${fmtTime(f.arr)}</div><div class="t-code">${to}</div></div>
      </div>
      <div class="pr-col">
        ${priceHtml}
        <div style="margin-top:3px">${statusHtml}</div>
      </div>
      <span class="src-badge ${isReal?'live':'demo'}">${isReal?'LIVE':'DEMO'}</span>
    `;
    list.appendChild(card);
  });
}

function startSeatRefresh() {
  if (seatTimer) clearInterval(seatTimer);
  seatTimer = setInterval(() => {
    document.querySelectorAll('.flight-card').forEach(card => {
      const f = curFlights.find(x=>x.fnum===card.dataset.fnum);
      if (!f) return;
      const seat=getSeat(f);
      const el=card.querySelector('.avail');
      if (el) { el.textContent=`${seat.ic} ${seat.text}`; el.className=`avail ${seat.cls}`; }
    });
  }, 30000);
}

// AirLabs airline IATA → our airline object
const AIRLINE_MAP = {
  // 直接予約できる国内線航空会社
  'NH':{code:'ANA',name:'全日空(ANA)',            short:'ANA',color:'#00a0e9',bg:'#00255a'},
  'JL':{code:'JAL',name:'日本航空(JAL)',          short:'JAL',color:'#e0002b',bg:'#330008'},
  'BC':{code:'SKY',name:'スカイマーク',           short:'SKY',color:'#4499dd',bg:'#001840'},
  'HD':{code:'ADO',name:'AIRDO',                short:'ADO',color:'#5588cc',bg:'#001235'},
  '7G':{code:'SFJ',name:'スターフライヤー',        short:'SFJ',color:'#aaaaaa',bg:'#181818'},
  '6J':{code:'SNJ',name:'ソラシドエア',           short:'6J', color:'#00bbaa',bg:'#003530'},
  'MM':{code:'APJ',name:'Peach',                short:'MM', color:'#ff3377',bg:'#400018'},
  'GK':{code:'JJP',name:'ジェットスター・ジャパン',short:'GK', color:'#ff6600',bg:'#2a1200'},
  'IP':{code:'FBZ',name:'フジドリーム(FDA)',      short:'FDA',color:'#cc3344',bg:'#2a0010'},
  // JAL系子会社（JALとして表示）
  'NU':{code:'JAL',name:'日本航空(JAL)',          short:'JAL',color:'#e0002b',bg:'#330008'},
  'JC':{code:'JAL',name:'日本航空(JAL)',          short:'JAL',color:'#e0002b',bg:'#330008'},
  'HA':{code:'JAL',name:'日本航空(JAL)',          short:'JAL',color:'#e0002b',bg:'#330008'},
  'HB':{code:'JAL',name:'日本航空(JAL)',          short:'JAL',color:'#e0002b',bg:'#330008'},
  'RAC':{code:'JAL',name:'日本航空(JAL)',         short:'JAL',color:'#e0002b',bg:'#330008'},
  // ANA系子会社（ANAとして表示）
  'EH':{code:'ANA',name:'全日空(ANA)',            short:'ANA',color:'#00a0e9',bg:'#00255a'},
  'NQ':{code:'ANA',name:'全日空(ANA)',            short:'ANA',color:'#00a0e9',bg:'#00255a'},
};
function getAirlineByIata(iata) {
  return AIRLINE_MAP[iata] || {code:iata,name:iata,short:iata,color:'#888',bg:'#1a1a1a'};
}

let currentApiKey = localStorage.getItem('airlabs_key') || '';
let dataSource = 'demo'; // 'demo' | 'live' | 'error'

function saveApiKey() {
  const key = document.getElementById('apikeyInput').value.trim();
  currentApiKey = key;
  localStorage.setItem('airlabs_key', key);
  if (key) {
    setApiStatus('checking', '接続確認中...');
    testApiKey(key);
  } else {
    setApiStatus('demo', 'デモデータ使用中');
  }
}

function setApiStatus(state, msg) {
  const dot = document.querySelector('#apikeyStatus .status-dot');
  const txt = document.getElementById('apikeyStatusText');
  dot.className = 'status-dot ' + (state==='live'?'live':state==='error'?'err':'demo');
  txt.innerHTML = msg + '&nbsp;·&nbsp;';
  document.getElementById('demo-tag-header').textContent = state==='live' ? '🟢 リアルデータ' : '⚠ デモデータ';
  document.getElementById('demo-tag-header').style.color = state==='live' ? 'var(--green)' : 'var(--gold)';
}

async function testApiKey(key) {
  try {
    const res = await fetch(`https://airlabs.co/api/v9/schedules?dep_iata=HND&api_key=${key}&limit=1`);
    const json = await res.json();
    if (json.error) {
      setApiStatus('error', `エラー: ${json.error.message||'無効なキー'}`);
      dataSource='demo';
    } else {
      dataSource='live';
      setApiStatus('live', 'AirLabs リアルデータ接続済み');
    }
  } catch(e) {
    setApiStatus('error', 'CORS/ネットワークエラー → デモ使用中');
    dataSource='demo';
  }
}

// ── /routes エンドポイント：全日程の定期便DB（日付に関係なく全便取得）
async function fetchRoutes(from, to) {
  if (!currentApiKey) return null;
  try {
    const url = `https://airlabs.co/api/v9/routes?dep_iata=${from}&arr_iata=${to}&api_key=${currentApiKey}&limit=200`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.error || !json.response) {
      console.warn('AirLabs /routes error:', json.error);
      return null;
    }
    return json.response; // [{dep_time:"07:30", arr_time:"09:05", days:["mon","tue",...], ...}]
  } catch(e) {
    console.warn('AirLabs /routes fetch failed:', e);
    return null;
  }
}

// ── /schedules エンドポイント：今後10時間のリアルタイム状況
async function fetchSchedules(from, to) {
  if (!currentApiKey) return null;
  try {
    const url = `https://airlabs.co/api/v9/schedules?dep_iata=${from}&arr_iata=${to}&api_key=${currentApiKey}&limit=100`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.error || !json.response) return null;
    return json.response;
  } catch(e) {
    console.warn('AirLabs /schedules fetch failed:', e);
    return null;
  }
}

// 曜日文字列変換
const DAY_NAMES = ['sun','mon','tue','wed','thu','fri','sat'];

// /routes レスポンス → フライトオブジェクト（選択日付でフィルタ）
function parseRouteEntry(entry, idx, selectedDate) {
  const toMin = str => {
    if (!str) return null;
    const [h,m] = str.split(':').map(Number);
    return h*60+m;
  };
  const dep = toMin(entry.dep_time);
  if (dep === null) return null;

  // AIRLINE_MAPにない航空会社（外国キャリア・コードシェア等）はスキップ
  if (!AIRLINE_MAP[entry.airline_iata]) return null;

  // 選択日付の曜日でフィルタ
  if (selectedDate && entry.days && entry.days.length > 0) {
    const dow = DAY_NAMES[new Date(selectedDate).getDay()];
    if (!entry.days.includes(dow)) return null;
  }

  const dur = entry.duration || 90;
  const arr = entry.arr_time ? toMin(entry.arr_time) : dep + dur;
  const airline = getAirlineByIata(entry.airline_iata || '');

  return {
    dep, arr, airline,
    fnum: entry.flight_iata || entry.flight_icao || '—',
    dur, price: null, idx,
    status: 'scheduled', delayed: 0,
    terminal: (entry.dep_terminals && entry.dep_terminals[0]) || '',
    gate: '',
    aircraft: entry.aircraft_icao || '',
    days: entry.days || [],
    isReal: true
  };
}

// 同一出発時刻の重複便を除去（コードシェア対策）
function deduplicateByDepTime(flights) {
  const seen = new Map(); // depTime → flight
  for (const f of flights) {
    const key = `${f.dep}-${f.airline.code}`;
    if (!seen.has(key)) seen.set(key, f);
  }
  return Array.from(seen.values());
}

// /schedules レスポンスをflightNumキーでMapに変換
function buildScheduleMap(schedules) {
  const map = {};
  if (!schedules) return map;
  for (const s of schedules) {
    const key = s.flight_iata || s.flight_icao;
    if (key) map[key] = s;
  }
  return map;
}

// ══════════════════════════════════════════════
//  OVERRIDE runSearch — routes主軸 + schedules重ね合わせ
// ══════════════════════════════════════════════
async function runSearch(from, to, date) {
  curFrom=from; curTo=to; curDate=date; activeFilter='all';
  const pane = document.getElementById('resultsPane');
  pane.style.display='block';
  document.getElementById('loading').style.display='block';
  document.getElementById('flightsList').innerHTML='';
  document.getElementById('resultsHdr').style.display='none';
  document.getElementById('noResults').style.display='none';
  pane.scrollTop=0;

  let usingReal = false;

  if (currentApiKey) {
    setApiStatus('checking', 'データ取得中...');

    // 1) routesで全定期便を取得（曜日フィルタで選択日にある便のみ）
    const routesData = await fetchRoutes(from, to);

    // 2) 今日なら schedulesでリアルタイム状況も取得
    const today = new Date().toISOString().slice(0,10);
    let scheduleMap = {};
    if (date === today) {
      const schedulesData = await fetchSchedules(from, to);
      scheduleMap = buildScheduleMap(schedulesData);
    }

    document.getElementById('loading').style.display='none';

    if (routesData && routesData.length > 0) {
      // routes → フライトオブジェクト変換（選択日の曜日でフィルタ済み）
      let flights = routesData
        .map((e,i) => parseRouteEntry(e, i, date))
        .filter(Boolean);

      // 同一航空会社・同一出発時刻の重複を除去
      flights = deduplicateByDepTime(flights);

      // scheduleMapで状況上書き（遅延・ゲート等）
      flights = flights.map(f => {
        const s = scheduleMap[f.fnum];
        if (s) {
          return {
            ...f,
            status: s.status || f.status,
            delayed: s.delayed || 0,
            gate: s.dep_gate || f.gate,
            terminal: s.dep_terminal || f.terminal,
            // スケジュールの実際時刻があれば上書き
            dep: (() => {
              const t = s.dep_estimated || s.dep_actual || null;
              if (!t) return f.dep;
              const d = new Date(t.replace(' ','T'));
              return isNaN(d) ? f.dep : d.getHours()*60+d.getMinutes();
            })(),
          };
        }
        return f;
      });

      flights.sort((a,b) => a.dep - b.dep);
      curFlights = flights;
      usingReal = true;
      dataSource = 'live';
      setApiStatus('live', `AirLabs 実データ (${flights.length}便)`);

    } else {
      // routesが空 → フォールバック
      setApiStatus('error', `実データなし → デモ使用`);
      curFlights = generateFlights(from, to, date);
    }
  } else {
    document.getElementById('loading').style.display='none';
    curFlights = generateFlights(from, to, date);
  }

  renderDateNav(date, from, to);
  renderFilterBar();
  renderFlights(curFlights, from, to, date, false, usingReal);
  if (!usingReal) startSeatRefresh();
}
